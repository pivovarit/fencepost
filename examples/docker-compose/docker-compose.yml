services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: fencepost
      POSTGRES_USER: fencepost
      POSTGRES_PASSWORD: fencepost
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fencepost"]
      interval: 2s
      retries: 10

  advisory:
    build:
      context: ../..
      dockerfile: examples/docker-compose/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fencepost
      DB_USER: fencepost
      DB_PASSWORD: fencepost
      LOCK_TYPE: advisory
    deploy:
      replicas: 3

  session:
    build:
      context: ../..
      dockerfile: examples/docker-compose/Dockerfile
    depends_on:
      advisory:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fencepost
      DB_USER: fencepost
      DB_PASSWORD: fencepost
      LOCK_TYPE: session
    deploy:
      replicas: 3

  lease:
    build:
      context: ../..
      dockerfile: examples/docker-compose/Dockerfile
    depends_on:
      session:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fencepost
      DB_USER: fencepost
      DB_PASSWORD: fencepost
      LOCK_TYPE: lease
    deploy:
      replicas: 3
